<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic de Peau IA - NUHANCIAM</title>
  
  <script src="https://plugins-media.makeupar.com/v2.2-camera-kit/sdk.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background: #fcfcfc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .wrapper {
      width: 100%;
      max-width: 450px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      box-sizing: border-box;
    }
    input[type="email"] {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    /* Fenêtre YouCam officielle */
    #YMK-module {
      width: 100%;
      height: 550px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div id="step-start">
    <h2>Diagnostic de Peau IA</h2>
    <p>Entrez votre email pour lancer la caméra YouCam</p>
    <input type="email" id="userEmail" placeholder="votre@email.com" required>
    <button type="button" id="startBtn">Ouvrir la caméra</button>
  </div>

  <div id="step-camera" style="display: none;">
    <div id="YMK-module"></div>
  </div>

  <div id="step-loading" style="display: none;">
    <h2>Analyse de votre visage... ✨</h2>
    <p>L'IA calcule vos scores de peau. Merci de patienter.</p>
  </div>

</div>

<script>
let userEmail = "";

window.ymkAsyncInit = function () {
  // Configuration d'origine requise par Perfect Corp
  YMK.init({
    apiKey: 'MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQDQ3NSlwDLKMm10bk8zoEKce7ohFCi5FsgCAp9qUngPpf8BGt58sRu4V5ekTrfs7lF1uzzXr4E/THe0IjCwgf6OtHQxMALFlBM+I78ZCuYidjzSibDD3HOqByinxOtB9PS+7i10yf4y9g+eXlr+BFlOBrOfUSS/ENDq7Ts2CDT3FQIDAQAB',
    faceDetectionMode: 'skincare',
    imageFormat: 'base64',
    language: 'en' // Évite le bug de dictionnaire linguistique fr
  });

  // Écouteur officiel de capture d'image YouCam
  YMK.addEventListener('faceDetectionCaptured', (capturedResult) => {
    if (capturedResult && capturedResult.images && capturedResult.images[0]) {
      let rawImage = capturedResult.images[0].image;
      
      if (rawImage && typeof rawImage === 'object' && rawImage.src) {
        rawImage = rawImage.src;
      }
      
      let base64Data = rawImage;
      if (typeof base64Data === 'string' && !base64Data.startsWith('data:')) {
        base64Data = 'data:image/jpeg;base64,' + base64Data;
      }
      
      // Fermeture propre de YouCam
      YMK.close();
      
      // Envoi à ton API d'analyse
      sendToBackend(base64Data);
    }
  });
};

document.getElementById('startBtn').addEventListener('click', function() {
  userEmail = document.getElementById('userEmail').value;
  if (!userEmail.includes('@')) {
    alert('Email invalide');
    return;
  }
  document.getElementById('step-start').style.display = 'none';
  document.getElementById('step-camera').style.display = 'block';
  
  // Lancement du module de base YouCam
  YMK.openCameraKit();
});

async function sendToBackend(base64Data) {
  document.getElementById('step-camera').style.display = 'none';
  document.getElementById('step-loading').style.display = 'block';

  // Alerte visuelle pour confirmer que YouCam a bien fini et passe le relais
  console.log("Transmission à l'API Vercel...");

  try {
    // Si ton API est sur le même projet Vercel, '/api/analyze' suffit.
    // Sinon, mets l'URL complète : 'https://diagnostic-de-peau.vercel.app/api/analyze'
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail, image: base64Data })
    });
    
    if (!response.ok) {
      throw new Error(`Le serveur a répondu avec un statut ${response.status}`);
    }

    const data = await response.json();
    console.log('✅ Traitement API réussi:', data);
    
    // Redirection vers ton Shopify une fois que c'est fini
    window.location.href = "https://nuhanciam.com/pages/merci-diagnostic";

  } catch (err) {
    console.error('❌ Erreur API Vercel:', err);
    
    // Affiche l'erreur directement sur l'écran pour comprendre le blocage
    document.getElementById('step-loading').innerHTML = `
      <h2 style="color: red;">Erreur d'analyse ❌</h2>
      <p>La photo a bien été prise, mais ton API Vercel a rencontré un problème :</p>
      <code style="background: #eee; padding: 10px; display: block; text-align: left; border-radius: 4px;">${err.message}</code>
      <button onclick="window.location.reload()" style="margin-top:15px; background:#000; color:#fff; padding:10px 20px; border:none; border-radius:4px; cursor:pointer;">Recommencer</button>
    `;
  }
}
</script>

</body>
</html>
